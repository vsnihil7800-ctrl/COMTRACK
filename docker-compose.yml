services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/comtrack
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-me-refresh
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL: http://localhost:5173
      UPLOAD_DIR: uploads
    ports:
      - "5000:5000"
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo_data:
  server_uploads:
